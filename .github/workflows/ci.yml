name: MaCheck Continuous Integration (CI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  typecheck:
    name: TypeScript & Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (Mobile)
        run: cd mobile && npm ci --legacy-peer-deps

      - name: Install dependencies (Functions)
        run: cd functions && npm ci

      - name: Run Typecheck & Functions Build
        run: npm run typecheck

  vendor-compliance:
    name: Google-Only Vendor Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Vendor Scan Script
        run: chmod +x ./scripts/check-google-only.sh && ./scripts/check-google-only.sh

  analytics-tests:
    name: Analytics Pipeline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run RAPIDS / Analytics Python Pipeline
        run: python3 platform/analytics/rapids_pipeline.py
