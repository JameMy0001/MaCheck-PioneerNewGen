project_id = "yacheck-macheck-shared"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 17

[storage.vector]
enabled = false

[auth]
enabled = true
site_url = "yacheck://auth"
additional_redirect_urls = ["macheck://auth"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
minimum_password_length = 10

[functions.register-username]
verify_jwt = false

[functions.login-username]
verify_jwt = false

[functions.recover-username]
verify_jwt = false

[functions.delete-account]
verify_jwt = true

[functions.send-caregiver-message]
verify_jwt = true

[functions.agent-run]
verify_jwt = true

[functions.agent-admin]
verify_jwt = false
